/*
 * This file was generated by the Gradle 'init' task.
 *
 * This project uses @Incubating APIs which are subject to change.
 */

plugins {
    id 'java-library'
    id 'maven-publish'
}

repositories {
    mavenLocal()
    maven {
        url = uri('https://oss.sonatype.org/content/repositories/snapshots')
    }

    maven {
        url = uri('https://repo.maven.apache.org/maven2/')
    }
}

dependencies {
    api libs.jakarta.servlet.jakarta.servlet.api
    api libs.com.cloudinary.cloudinary.http44
    api libs.jakarta.servlet.jsp.jstl.jakarta.servlet.jsp.jstl.api
    api libs.org.glassfish.web.jakarta.servlet.jsp.jstl
    api libs.org.jdbi.jdbi3.core
    api libs.com.mysql.mysql.connector.j
    api libs.jakarta.mail.jakarta.mail.api
    api libs.org.eclipse.angus.angus.mail
    api libs.org.eclipse.angus.angus.activation
    api libs.com.sun.mail.jakarta.mail
    api libs.javax.mail.javax.mail.api
    api libs.org.springframework.security.spring.security.core
    api libs.com.google.code.gson.gson
    api libs.com.google.api.client.google.api.client
    api libs.com.google.oauth.client.google.oauth.client.jetty
    api libs.com.fasterxml.jackson.core.jackson.databind
    api libs.io.github.momo.wallet.momopayment
    api libs.org.json.json
    testImplementation libs.org.junit.jupiter.junit.jupiter.api
    testImplementation libs.org.junit.jupiter.junit.jupiter.engine
}

group = 'vn.edu.hcmuaf.fit'
version = '1.0-SNAPSHOT'
description = 'Web'
java.sourceCompatibility = JavaVersion.VERSION_1_8

publishing {
    publications {
        maven(MavenPublication) {
            from(components.java)
        }
    }
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

tasks.withType(Javadoc) {
    options.encoding = 'UTF-8'
}
